version: "2"

linters:
  exclusions:
    # Idiomatic ignore-on-cleanup calls (deferred Close, Flush, os.Remove,
    # fmt.Fprint* to buffered/terminal sinks) — the stdlib error-handling set.
    presets:
      - std-error-handling
    rules:
      # Tests fail loudly on their own; unchecked cleanup returns are noise.
      - path: _test\.go
        linters:
          - errcheck
      # SA5011 false positive on the `if x == nil { t.Fatal } → deref` pattern
      # (staticcheck fails to model t.Fatal as no-return here). Config-level
      # because a site //nolint can't cover it: golangci also emits the
      # "related information" diagnostic at the nil-CHECK line as its own issue.
      - path: _test\.go
        text: "SA5011"
        linters:
          - staticcheck
