<!doctype html>
<html lang="en">
   <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>SRR admin — bundle not built</title>
   </head>
   <body>
      <main>
         <h1>SRR admin console — placeholder</h1>
         <p>
            This is the committed placeholder that lets <code>go build</code>,
            <code>go vet</code> and <code>go test</code> compile the
            <code>//go:embed</code> without Node.
         </p>
         <p>
            The real admin console is a Parcel bundle. Build it with
            <code>make build-admin</code> (or <code>make build-be</code>, which
            depends on it), then re-run <code>srr serve</code>.
         </p>
      </main>
   </body>
</html>
