<!doctype html>
<html lang="en">
   <head>
      <title>SRR</title>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
      <meta name="description" content="Static RSS reader." />
      <meta name="format-detection" content="telephone=no" />
      <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)" />
      <meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)" />
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-title" content="SRR" />
      <meta name="mobile-web-app-capable" content="yes" />
      <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8' fill='%23f26522'><circle cx='1' cy='7' r='1'/><path d='M0 3v1a4 4 0 014 4h1A5 5 0 000 3z'/><path d='M0 0v1a7 7 0 017 7h1A8 8 0 000 0z'/></svg>" />
      <link rel="apple-touch-icon" href="apple-touch-icon.png" />
      <!-- use-credentials: the manifest is fetched in CORS mode without cookies by
           default; behind an auth proxy (Cloudflare Access) that unauthenticated
           fetch gets 302'd cross-origin to the login → CORS error. Sending creds
           lets the Access session cookie ride along so it returns 200. -->
      <link rel="manifest" href="manifest.webmanifest" crossorigin="use-credentials" />
      <link rel="stylesheet" href="styles.css" />
      <base target="_blank" />
   </head>
   <body>
      <div class="srr-popup" role="dialog" aria-modal="true" aria-live="assertive">
         <span class="srr-popup-text"></span>
         <button class="srr-popup-retry srr-hidden">Retry</button>
         <button class="srr-popup-close" aria-label="Close">&times;</button>
      </div>
      <main class="srr-container">
         <div class="srr-searchbar" role="search">
            <div class="srr-searchbar-row">
               <span class="srr-search-icon" aria-hidden="true"></span>
               <input type="search" class="srr-search-input" aria-label="Search article titles" placeholder="Search titles…" autocomplete="off" enterkeyhint="search" />
               <button class="srr-search-clear" aria-label="Clear search" title="Clear search">&times;</button>
            </div>
            <div class="srr-search-note" hidden></div>
         </div>
         <article class="srr-reader" hidden>
            <div class="srr-title-row">
               <div class="srr-kicker">
                  <span class="srr-source"></span>
                  <time class="srr-date"></time>
               </div>
               <a class="srr-title-link">
                  <h1 class="srr-title" tabindex="-1"></h1>
               </a>
            </div>
            <div class="srr-content"></div>
         </article>
         <div class="srr-list" aria-label="Article list" hidden></div>
         <nav class="srr-toolbar" aria-label="Article navigation">
            <div class="srr-toolbar-left">
               <button class="srr-back" aria-label="Back to list" title="Back to list">
                  <span class="srr-back-icon" aria-hidden="true"></span>
               </button>
               <button class="srr-cancel" aria-label="Cancel — return to the article you were reading" title="Cancel (return to the article you were reading)">
                  <svg class="srr-cancel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                     <path d="M9 14 4 9l5-5" />
                     <path d="M4 9h11a5 5 0 0 1 5 5v3" />
                  </svg>
               </button>
               <div class="srr-dropdown">
                  <button class="srr-dropdown-btn srr-channel" aria-expanded="false" aria-haspopup="menu"></button>
                  <div id="srr-channel-menu" class="srr-dropdown-menu" role="menu"></div>
               </div>
               <button class="srr-unread-toggle srr-unread-off" aria-pressed="false" aria-label="Unseen-only navigation: off" title="Unseen-only (tags): off">
                  <svg class="srr-unread-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                     <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
                     <circle cx="12" cy="12" r="3" />
                  </svg>
               </button>
            </div>
            <div class="srr-toolbar-right">
               <button class="srr-save" aria-label="Save article" aria-keyshortcuts="b" aria-pressed="false" title="Save article (B)" disabled>
                  <svg class="srr-save-icon" viewBox="0 0 24 24" aria-hidden="true">
                     <path d="M12 3.4l2.6 5.3 5.8.8-4.2 4.1 1 5.8-5.2-2.7-5.2 2.7 1-5.8-4.2-4.1 5.8-.8z" />
                  </svg>
               </button>
               <div class="srr-dropdown">
                  <button class="srr-imgproxy srr-dropdown-btn" aria-expanded="false" aria-haspopup="menu" aria-label="Image proxy" title="Image proxy">
                     <svg class="srr-imgproxy-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <circle cx="9" cy="9" r="2" />
                        <path d="M21 15l-5-5L5 21" />
                     </svg>
                  </button>
                  <div id="srr-imgproxy-menu" class="srr-dropdown-menu" role="menu" aria-label="Image proxy"></div>
               </div>
               <span class="srr-jump-wrap">
                  <button class="srr-jump" aria-label="Jump to a date" title="Jump to a date">
                     <svg class="srr-jump-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="4" width="18" height="17" rx="2" />
                        <path d="M3 9h18M8 2v4M16 2v4" />
                     </svg>
                  </button>
                  <input type="date" class="srr-jump-date" tabindex="-1" aria-hidden="true" />
               </span>
               <button class="srr-search" aria-pressed="false" aria-label="Search articles" aria-keyshortcuts="/" title="Search (/)">
                  <span class="srr-search-icon" aria-hidden="true"></span>
               </button>
               <button class="srr-prev" disabled aria-label="Previous article" aria-keyshortcuts="ArrowLeft a" title="Previous article (←/A)">
                  <span class="srr-prev-icon" aria-hidden="true"></span>
               </button>
               <button class="srr-next" disabled aria-label="Next article" aria-keyshortcuts="ArrowRight d" title="Next article (→/D)">
                  <span class="srr-next-icon" aria-hidden="true"></span>
               </button>
               <button class="srr-resume" aria-label="Resume reading (latest)" title="Resume reading (latest)">
                  <svg class="srr-resume-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                     <path d="M4 5l12 7L4 19z" />
                     <rect x="17" y="5" width="3" height="14" />
                  </svg>
               </button>
            </div>
         </nav>
      </main>
      <noscript><p style="text-align: center; margin: 2rem">JavaScript is required to load feeds.</p></noscript>
      <script src="js/app.ts" type="module"></script>
   </body>
</html>
