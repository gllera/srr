<!doctype html>
<html lang="en">
   <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>SRR admin</title>
      <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)" />
      <meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)" />
      <link
         rel="icon"
         href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8' fill='%23f26522'><circle cx='1' cy='7' r='1'/><path d='M0 3v1a4 4 0 014 4h1A5 5 0 000 3z'/><path d='M0 0v1a7 7 0 017 7h1A8 8 0 000 0z'/></svg>"
      />
      <link rel="stylesheet" href="admin.css" />
   </head>
   <body>
      <!-- Icon sprite: the four Feather row-action icons as <symbol>s, referenced
           by <use href="#i-…"> elements the port builds (SEC3 replaced app.js's
           raw-innerHTML ICON_* strings). Inline SVG, no script/style. -->
      <svg class="sprite" aria-hidden="true" focusable="false">
         <defs>
            <symbol id="i-edit" viewBox="0 0 24 24">
               <path d="M12 20h9" />
               <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z" />
            </symbol>
            <symbol id="i-delete" viewBox="0 0 24 24">
               <polyline points="3 6 5 6 21 6" />
               <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
               <line x1="10" y1="11" x2="10" y2="17" />
               <line x1="14" y1="11" x2="14" y2="17" />
            </symbol>
            <symbol id="i-fetch" viewBox="0 0 24 24">
               <polyline points="23 4 23 10 17 10" />
               <polyline points="1 20 1 14 7 14" />
               <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
            </symbol>
            <symbol id="i-preview" viewBox="0 0 24 24">
               <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
               <circle cx="12" cy="12" r="3" />
            </symbol>
         </defs>
      </svg>

      <header>
         <div class="ident">
            <span class="signal" aria-hidden="true">
               <svg viewBox="0 0 8 8" fill="currentColor">
                  <circle cx="1" cy="7" r="1" />
                  <path d="M0 3v1a4 4 0 014 4h1A5 5 0 000 3z" />
                  <path d="M0 0v1a7 7 0 017 7h1A8 8 0 000 0z" />
               </svg>
            </span>
            <span class="wordmark">SRR</span>
            <!-- The running binary's version, filled from the overview snapshot. -->
            <span class="ver" id="ver"></span>
         </div>
         <nav id="tabs" aria-label="Sections">
            <button data-tab="feeds" class="active">Feeds</button>
            <button data-tab="recipes">Recipes</button>
            <button data-tab="syndicate">Syndicate</button>
            <button data-tab="tools">Tools</button>
         </nav>
      </header>
      <div id="banner" hidden></div>
      <main>
         <section id="feeds" class="tab active"></section>
         <section id="recipes" class="tab"></section>
         <section id="syndicate" class="tab"></section>
         <section id="tools" class="tab"></section>
      </main>
      <script src="js/admin/main.ts" type="module"></script>
   </body>
</html>
