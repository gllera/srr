<!doctype html>
<html lang="en" data-srr-harness>
   <head>
      <title>SRR · Design Harness</title>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
      <meta name="robots" content="noindex" />
      <!-- Dev-serve fallback: guarantees SRR_CDN_URL is defined before the module
           bundle evaluates, regardless of how parcel serve orders shared bundles.
           A production/single-entry build's injection overwrites this with the
           resolved value (e.g. /packs/) since it runs at the bundle entry. -->
      <script>
         globalThis.SRR_CDN_URL ||= "http://localhost:3000"
      </script>
      <link rel="stylesheet" href="styles.css" />
      <base target="_blank" />
   </head>
   <body>
      <!-- srr:skeleton:start -->
      <div class="srr-popup" role="dialog" aria-modal="true" aria-live="assertive">
         <span class="srr-popup-text"></span>
         <button class="srr-popup-retry srr-hidden">Retry</button>
         <button class="srr-popup-close" aria-label="Close">&times;</button>
      </div>
      <!-- Image-proxy settings dialog — a true centered modal (dimmed backdrop),
           opened from the ⋯ overflow menu. dropdown.ts injects the editable body
           (input + Save/Disable/Cancel) into .srr-imgproxy-body on open, shows the
           overlay, traps focus, and closes on Escape / backdrop / commit. -->
      <div class="srr-imgproxy-dialog" role="dialog" aria-modal="true" aria-labelledby="srr-imgproxy-title">
         <div class="srr-imgproxy-card">
            <h2 class="srr-imgproxy-title" id="srr-imgproxy-title">Image proxy</h2>
            <p class="srr-imgproxy-desc">
               Route article images through a proxy URL — useful for upgrading insecure images to HTTPS. Leave it empty
               to load images straight from the source.
            </p>
            <div class="srr-imgproxy-body"></div>
         </div>
      </div>
      <main class="srr-container">
         <div class="srr-searchbar" role="search">
            <div class="srr-searchbar-row">
               <span class="srr-search-icon" aria-hidden="true"></span>
               <input
                  type="search"
                  class="srr-search-input"
                  aria-label="Search article titles"
                  placeholder="Search titles…"
                  autocomplete="off"
                  enterkeyhint="search"
               />
               <button class="srr-search-clear" aria-label="Clear search" title="Clear search">&times;</button>
            </div>
            <div class="srr-search-note" hidden></div>
         </div>
         <article class="srr-reader" hidden>
            <div class="srr-title-row">
               <div class="srr-kicker">
                  <span class="srr-source"></span>
                  <time class="srr-date"></time>
               </div>
               <a class="srr-title-link">
                  <h1 class="srr-title" tabindex="-1"></h1>
               </a>
            </div>
            <div class="srr-content"></div>
         </article>
         <div class="srr-list" aria-label="Article list" hidden></div>
         <!-- One row of four equal slots (styles.css: grid). DOM order interleaves
              the reader + list controls so each surface's visible four read
              left→right correctly — reader: back · prev · next · save; list:
              filter · search · unread · ⋯ (the other surface's controls are
              display:none per the view rules in styles.css). -->
         <nav class="srr-toolbar" aria-label="Article navigation">
            <button class="srr-back" aria-label="Back to list" title="Back to list">
               <span class="srr-back-icon" aria-hidden="true"></span>
            </button>
            <div class="srr-dropdown">
               <button class="srr-dropdown-btn srr-feed" aria-expanded="false" aria-haspopup="menu"></button>
               <div id="srr-feed-menu" class="srr-dropdown-menu" role="menu"></div>
            </div>
            <button
               class="srr-prev"
               disabled
               aria-label="Previous article"
               aria-keyshortcuts="ArrowLeft a"
               title="Previous article (←/A)"
            >
               <span class="srr-prev-icon" aria-hidden="true"></span>
            </button>
            <button
               class="srr-search"
               aria-pressed="false"
               aria-label="Search articles"
               aria-keyshortcuts="/"
               title="Search (/)"
            >
               <span class="srr-search-icon" aria-hidden="true"></span>
            </button>
            <button
               class="srr-next"
               disabled
               aria-label="Next article"
               aria-keyshortcuts="ArrowRight d"
               title="Next article (→/D)"
            >
               <span class="srr-next-icon" aria-hidden="true"></span>
            </button>
            <button class="srr-unread" aria-pressed="false" aria-label="Show only unread" title="Show only unread">
               <span class="srr-unread-icon" aria-hidden="true"></span>
            </button>
            <button
               class="srr-save"
               aria-label="Save article"
               aria-keyshortcuts="b"
               aria-pressed="false"
               title="Save article (B)"
               disabled
            >
               <svg class="srr-save-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3.4l2.6 5.3 5.8.8-4.2 4.1 1 5.8-5.2-2.7-5.2 2.7 1-5.8-4.2-4.1 5.8-.8z" />
               </svg>
            </button>
            <div class="srr-dropdown">
               <button
                  class="srr-overflow srr-dropdown-btn"
                  aria-expanded="false"
                  aria-haspopup="menu"
                  aria-label="More options"
                  title="More options"
               >
                  <svg class="srr-overflow-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                     <circle cx="5" cy="12" r="2" />
                     <circle cx="12" cy="12" r="2" />
                     <circle cx="19" cy="12" r="2" />
                  </svg>
               </button>
               <div id="srr-overflow-menu" class="srr-dropdown-menu" role="menu" aria-label="More options"></div>
            </div>
         </nav>
      </main>
      <!-- srr:skeleton:end -->
      <div id="srr-design-panel" aria-label="Design harness controls"></div>
      <!-- Single module entry (design-boot imports ./app + ./design) so the page
           has one bundle and the SRR_CDN_URL build-injection's load order holds. -->
      <script src="js/design-boot.ts" type="module"></script>
   </body>
</html>
