name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

# Serialize Cloudflare Pages deploys so overlapping tag pushes don't race to
# publish the production deployment; let an in-flight deploy finish rather than
# cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Gate every release artifact on a green `make verify` (lint + format + tests +
  # build + the boot smoke + the e2e contract layer). Without this, a tag push
  # publishes binaries and deploys the frontend to Pages without the build ever
  # passing its own gates — exactly how a frontend that fails its tests (or a
  # bundle that doesn't boot) could reach production.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-toolchain
    - run: make verify

  # The browser e2e layer is NOT part of `make verify` (see the Makefile), and
  # ci.yml has no `tags:` trigger — so without this job a tag push deploys the
  # production reader with the browser layer red or never run. Mirrors ci.yml's
  # `browser` job.
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v6
    # Needs Go (test-browser builds the srr binary) but never lints.
    - uses: ./.github/actions/setup-toolchain
      with:
        lint: "false"
    # Chrome is downloaded by puppeteer's postinstall during npm ci; restoring
    # the cache first lets it skip the download on a hit.
    - name: Cache Puppeteer Chrome
      uses: actions/cache@v4
      with:
        path: ~/.cache/puppeteer
        key: puppeteer-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
        restore-keys: |
          puppeteer-${{ runner.os }}-
    - run: make test-browser

  release:
    if: github.event_name == 'push'
    needs: [verify, browser]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERSION: ${{ github.ref_name }}
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-toolchain
    - run: make release
    # Bundle the built SPA as a flat tarball (entries are index.html, hashed
    # assets — no leading dir) so `srr frontend update` can install it into a
    # store root. Built with NO cdn-url (deliberately no SRR_CONFIG_INLINE here),
    # so resolve-cdn-url.js falls back to "." — the shell fetches packs relative
    # to its own index.html and is origin-portable: it renders from whatever
    # store root it's installed into. (The `cf-pages` job below keeps the absolute
    # cdn-url; there the hosted reader and the packs live on different origins.)
    - run: make build-fe
    - run: tar czf srrf.tar.gz -C dist/srrf .
    - uses: softprops/action-gh-release@v3
      with:
        files: |
          dist/srr-*
          srrf.tar.gz

  cf-pages:
    needs: [verify, browser]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ci
    env:
      # Build WITH the absolute cdn-url so PACK_BASE is the pack store origin:
      # this Cloudflare Pages deployment is the reader ONLY and fetches packs
      # cross-origin. SRR_CDN_URL is the highest-precedence cdn-url source in
      # resolve-cdn-url.js (env → config `cdn-url:` → "."). (The srrf.tar.gz
      # Release asset is built with NO cdn-url for same-origin self-hosting —
      # don't deploy that one here, it would 404 on db.gz against the Pages
      # origin.)
      SRR_CDN_URL: ${{ secrets.SRR_CDN_URL }}
      # The build's version label (config footer / transformer-define.js's
      # SRR_VERSION): the tag on tag builds, the branch name on manual dispatch.
      VERSION: ${{ github.ref_name }}
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-toolchain
      with:
        go: "false"
    - run: make build-fe
    # Direct Upload the built SPA (dist/srrf) to Cloudflare Pages. --branch=main
    # marks it a production deploy — it must equal the project's configured
    # production branch, and tag pushes carry no branch context so it's passed
    # explicitly. Needs repo/ci-environment secrets CLOUDFLARE_API_TOKEN (token
    # scoped to Account → Cloudflare Pages → Edit) and CLOUDFLARE_ACCOUNT_ID.
    - uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy dist/srrf --project-name=srr-frontend --branch=main
