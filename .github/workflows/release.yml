name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  pages: write
  id-token: write

# Serialize Pages deploys so overlapping tag pushes don't race deploy-pages;
# let an in-flight deploy finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Gate every release artifact on a green `make verify` (lint + format + tests +
  # build + the boot smoke + the e2e contract layer). Without this, a tag push
  # publishes binaries and deploys the frontend to Pages without the build ever
  # passing its own gates — exactly how a frontend that fails its tests (or a
  # bundle that doesn't boot) could reach production.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-toolchain
    - run: make verify

  release:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # `ci` environment exposes SRR_CONFIG_INLINE (the build-time cdn-url) to the
    # frontend bundle, the same way the `pages` job builds it.
    environment: ci
    env:
      VERSION: ${{ github.ref_name }}
      SRR_CONFIG_INLINE: ${{ secrets.SRR_CONFIG_INLINE }}
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-toolchain
    - run: make release
    # Bundle the built SPA as a flat tarball (entries are index.html, hashed
    # assets — no leading dir) so `srr frontend update` can install it into a
    # store root. Built with SRR_CONFIG_INLINE so it bakes the configured
    # (absolute) cdn-url, matching the published Pages build.
    - run: make build-fe
    - run: tar czf srrf.tar.gz -C dist/srrf .
    - uses: softprops/action-gh-release@v3
      with:
        files: |
          dist/srr-*
          srrf.tar.gz

  pages:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ci
    env:
      SRR_CONFIG_INLINE: ${{ secrets.SRR_CONFIG_INLINE }}
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-toolchain
      with:
        go: "false"
    - run: make build-fe
    - uses: actions/upload-pages-artifact@v5
      with:
        path: dist/srrf
    - uses: actions/deploy-pages@v5
