name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-toolchain
    - run: make verify

  browser:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-toolchain
    # Chrome is downloaded by puppeteer's postinstall during npm ci; restoring
    # the cache first lets it skip the download on a hit.
    - name: Cache Puppeteer Chrome
      uses: actions/cache@v4
      with:
        path: ~/.cache/puppeteer
        key: puppeteer-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
    - run: make test-browser
