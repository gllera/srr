name: Setup toolchain
description: >
  Set up the SRR monorepo toolchain (Go and/or Node) with dependency caching.
  Single-sources the versions: Go from backend/go.mod, Node from .nvmrc.
inputs:
  go:
    description: Set up Go (backend toolchain).
    default: "true"
  node:
    description: Set up Node (frontend toolchain).
    default: "true"
  lint:
    description: >
      Install golangci-lint (needed by any job running make verify /
      verify-be / release). Off for jobs that build but never lint.
    default: "true"
runs:
  using: composite
  steps:
    - if: inputs.go == 'true'
      uses: actions/setup-go@v6
      with:
        go-version-file: backend/go.mod
        cache-dependency-path: backend/go.sum
    # make verify runs golangci-lint (lint-be gates verify-be). Both the script
    # ref and the binary version are pinned to the release backend/.golangci.yml
    # targets (version: "2" schema) — an unpinned HEAD script is a moving
    # curl-pipe-sh target.
    - if: inputs.go == 'true' && inputs.lint == 'true'
      name: Install golangci-lint
      shell: bash
      run: |
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh \
          | sh -s -- -b "$HOME/.local/bin" v2.12.2
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
    - if: inputs.node == 'true'
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
